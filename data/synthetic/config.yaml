# Physlr test configuration (synthetic data)
physlr_bin: "target/release/physlr"
outdir: "data/synthetic/output"
prefix: "synthetic"

linked_reads: "data/synthetic/linked_reads.fq"
reference: "data/synthetic/reference.fa"
genome_size: 300000

draft_assemblies:
  draft1: "data/synthetic/draft1.fa"
  draft2: "data/synthetic/draft2.fa"

# Parameters (tuned for small synthetic data)
k: 20
w: 10
min_bx_count: 2
max_bx_count: 5000
min_overlap: 2
edge_percentile: 0
prune_branches: 2
min_path_size: 3
min_map_score: 2
gap_size: 100
